<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="380" fill="#0f172a"/>
  <text x="360" y="32" fill="#e2e8f0" font-size="20" font-weight="700" text-anchor="middle">Small-input Latency — 64 B (ns/op, lower is better)</text>

  <!-- gridlines + y labels -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="70" y1="300" x2="690" y2="300"/>
    <line x1="70" y1="240" x2="690" y2="240"/>
    <line x1="70" y1="180" x2="690" y2="180"/>
    <line x1="70" y1="120" x2="690" y2="120"/>
    <line x1="70" y1="60"  x2="690" y2="60"/>
  </g>
  <g fill="#64748b" font-size="12" text-anchor="end">
    <text x="60" y="304">0</text>
    <text x="60" y="244">75</text>
    <text x="60" y="184">150</text>
    <text x="60" y="124">225</text>
    <text x="60" y="64">300</text>
  </g>

  <!-- bars -->
  <g>
    <rect x="107.5" y="173" width="80" height="127" rx="4" fill="#f87171"/>
    <rect x="262.5" y="148" width="80" height="152" rx="4" fill="#fbbf24"/>
    <rect x="417.5" y="78"  width="80" height="222" rx="4" fill="#34d399"/>
    <rect x="572.5" y="152" width="80" height="148" rx="4" fill="#60a5fa"/>
  </g>

  <!-- value labels -->
  <g fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">
    <text x="147.5" y="165">158.6</text>
    <text x="302.5" y="140">190.0</text>
    <text x="457.5" y="70">277.2</text>
    <text x="612.5" y="144">184.9</text>
  </g>

  <!-- x labels -->
  <g fill="#cbd5e1" font-size="14" text-anchor="middle">
    <text x="147.5" y="322">MD5</text>
    <text x="302.5" y="322">SHA-1</text>
    <text x="457.5" y="322">SHA-256</text>
    <text x="612.5" y="322">SHA-512</text>
  </g>

  <text x="360" y="362" fill="#475569" font-size="11" text-anchor="middle">AMD Ryzen 5 5600G · linux/amd64 · go test -bench=. -benchmem</text>
</svg>
